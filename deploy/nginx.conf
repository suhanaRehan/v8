# /etc/nginx/sites-available/yourdomain.com
#
# Replace yourdomain.com everywhere below with your real domain, then:
#   sudo ln -s /etc/nginx/sites-available/yourdomain.com /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Run certbot AFTER this file is enabled (see setup.sh) — certbot edits
# this file in place to add the SSL certificate/key lines and the
# HTTP -> HTTPS redirect automatically.

# Plain HTTP - certbot will rewrite this block to redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Strip any client-supplied x-middleware-subrequest header before it
        # reaches Next.js. This header is meant to be internal-only; some
        # older Next.js versions trusted it blindly (CVE-2025-29927) and let
        # attackers bypass middleware-based auth checks with it. Your
        # package-lock.json already has next@14.2.35 which is patched, but
        # stripping it here costs nothing and protects you even if a future
        # dependency bump ever regresses this.
        proxy_set_header x-middleware-subrequest "";
    }

    # Let certbot answer ACME HTTP-01 challenges for renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
